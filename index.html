<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FreshCart Grocery</title>

    <!-- External CSS -->
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <script>
if (!localStorage.getItem("loggedInUser")) {
    window.location.href = "login.html";
}
</script>

    <!--  HEADER -->

    <header class="header">

        <!-- Logo -->
        <div class="logo-section">
            <img src="images/logo.png" alt="FreshCart Logo" class="logo">
        </div>

        <!-- Delivery Location -->
        <div class="location">
            <h4>Delivering to</h4>
            <p>Hyderabad</p>
        </div>

        <!-- Search -->
        <div class="search-box">
    <input
        type="text"
        id="searchInput"
        placeholder="Search groceries...">
</div>

<!-- My Orders -->
<a href="orders.html" class="orders-link">

    My Orders

</a>

<!-- Logged In User -->
<div class="user-email">

    <span id="loggedUser"></span>

</div>

<!-- Logout -->
<button id="logoutBtn">

    Logout

</button>

<!-- Cart -->
<div class="cart">
            <span class="cart-icon">🛒</span>
            <span id="cartCount">0</span>
        </div>

    </header>

    <!--  CATEGORY SECTION  -->

    <section
    class="category-section"
    id="categorySection">

</section>
    <!-- PRODUCT GRID  -->

    <main>

    <!-- Loading -->

    <div id="loading" class="loading">

        Loading products...

    </div>

    <!-- Error -->

    <div id="errorMessage" class="error-message">

        Failed to load products. Please try again.

    </div>

    <!-- Product Grid -->

    <div id="productGrid" class="product-grid">

    </div>

    <!-- No Products -->

    <div id="noProducts" class="no-products">

        No products found.

    </div>

</main>
<div id="successMessage" class="success-message">

    Order placed successfully!

</div>
    <!-- CART SUMMARY  -->

    <div id="cartSummary" class="cart-summary">

        <div class="cart-details">
            <h3>
                <span id="totalItems">0</span> Items
            </h3>

            <p>
                Total : ₹<span id="totalPrice">0</span>
            </p>
        </div>

        <button id="checkoutBtn">
            Proceed to Checkout
        </button>

    </div>

    <!-- External JavaScript -->
    <script src="script.js"></script>

</body>
</html>
