<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FreshCart Grocery</title>

    <!-- External CSS -->
    <link rel="stylesheet" href="style.css">
</head>

<body>

    <!--  HEADER -->

    <header class="header">

        <!-- Logo -->
        <div class="logo-section">
            <img src="images/logo.png" alt="FreshCart Logo" class="logo">
        </div>

        <!-- Delivery Location -->
        <div class="location">
            <h4>Delivering to</h4>
            <p>Hyderabad</p>
        </div>

        <!-- Search -->
        <div class="search-box">
    <input
        type="text"
        id="searchInput"
        placeholder="Search groceries...">
</div>

<!-- My Orders -->
<a href="orders.html" class="orders-link">

    My Orders

</a>

<!-- Logged In User -->
<div class="user-email">

    <span id="loggedUser"></span>

</div>

<!-- Logout -->
<button id="logoutBtn">

    Logout

</button>

<!-- Cart -->
<div class="cart">
            <span class="cart-icon">🛒</span>
            <span id="cartCount">0</span>
        </div>

    </header>

    <!--  CATEGORY SECTION  -->

    <section class="category-section">

        <button class="category-btn active" data-category="All">All</button>

        <button class="category-btn" data-category="Fruits & Vegetables">
            Fruits & Vegetables
        </button>

        <button class="category-btn" data-category="Dairy & Eggs">
            Dairy & Eggs
        </button>

        <button class="category-btn" data-category="Snacks">
            Snacks
        </button>

        <button class="category-btn" data-category="Beverages">
            Beverages
        </button>

        <button class="category-btn" data-category="Bakery">
            Bakery
        </button>

        <button class="category-btn" data-category="Personal Care">
            Personal Care
        </button>

    </section>

    <!-- PRODUCT GRID  -->

    <main>

        <div id="productGrid" class="product-grid">
            <!-- Products will be generated by JavaScript -->
        </div>

        <div id="noProducts" class="no-products">
            No products found.
        </div>

    </main>

    <!-- CART SUMMARY  -->

    <div id="cartSummary" class="cart-summary">

        <div class="cart-details">
            <h3>
                <span id="totalItems">0</span> Items
            </h3>

            <p>
                Total : ₹<span id="totalPrice">0</span>
            </p>
        </div>

        <button id="checkoutBtn">
            Proceed to Checkout
        </button>

    </div>

    <!-- External JavaScript -->
    <script src="script.js"></script>

</body>
</html>
