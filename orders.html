<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Orders - FreshCart</title>

    <link rel="stylesheet" href="style.css">
</head>
<body>

    <!-- HEADER -->

    <header class="header">

        <div class="logo-section">

            <img src="images/logo.png" alt="FreshCart Logo" class="logo">

        </div>

        <h2>My Orders</h2>

    </header>

    <!-- ORDER HISTORY -->

    <main class="orders-page">

        <div id="ordersContainer">

            <!-- Orders will be displayed here -->

        </div>

        <div id="noOrders" class="no-products">

            No orders placed yet.

        </div>

        <button
            class="back-btn"
            onclick="window.location.href='shop.html'">

            Back to Shop

        </button>

    </main>

    <script src="script.js"></script>

</body>
</html>
